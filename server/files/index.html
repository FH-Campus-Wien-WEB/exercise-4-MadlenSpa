<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies!</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="index.js"></script>
  </head>

  <body>
    <header>
      <h1>Movies!</h1>
    </header>
    <div id="userGreeting" class="user-greeting" role="status" aria-live="polite"></div>
    <nav>
      <h2>Genres</h2>
      <ul id="filter"></ul>
      <h2>Manage</h2>
      <ul>
        <li>
          <button id="addMoviesBtn">Add movies</button>
        </li>
        <li>
          <button id="authBtn">Login</button>
        </li>
      </ul>
    </nav>
    <main></main>
    <footer>
      <p>&copy; Movies! &#8213; Written by Madlen Sparr</p>
      <p class="footer-note">Powered by popcorn, plot twists, and suspiciously long watchlists.</p>
    </footer>

    <!-- Login Dialog -->
    <dialog id="loginDialog">
      <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Login</button>
        <button type="button" id="cancelLogin">Cancel</button>
      </form>
    </dialog>

    <!-- Search Dialog -->
    <dialog id="searchDialog">
      <form id="searchForm">
        <label for="query">Search for a movie:</label>
        <input type="text" id="query" name="query" required placeholder="e.g. Inception" />
        <button type="submit">Search</button>
        <button type="button" id="cancelSearch">Cancel</button>
      </form>
      <div id="searchResults"></div>
    </dialog>
    
  </body>
</html>
